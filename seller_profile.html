<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>BEKYA · seller dashboard</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* (existing styles – unchanged) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* CSS Variables – light mode (default) */
        body {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-light: #e2e8f0;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --hover-glow: 0 0 0 2px rgba(10, 61, 42, 0.2), 0 0 20px rgba(10, 61, 42, 0.15);
            --accent-green: #0A3D2A;
            --accent-soft: #eef7f2;
            --progress-bg: #e2e8f0;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        /* dark mode class */
        body.dark {
            --bg-primary: #0f1a1c;
            --bg-secondary: #1a2a2c;
            --surface: #1f2e30;
            --text-primary: #edf2f7;
            --text-secondary: #cbd5e1;
            --border-light: #2d3f42;
            --card-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
            --accent-soft: #1e3a2f;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* layout */
        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 1rem;
            width: 100%;
        }

        /* ----- HEADER (now only logo) ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--accent-green);
            background: linear-gradient(145deg, #0A3D2A, #1b6b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .toggle-btn {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .toggle-btn i {
            font-size: 1.2rem;
            color: var(--accent-green);
        }

        .toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-glow);
            border-color: var(--accent-green);
        }

        /* ----- DASHBOARD LAYOUT ----- */
        .dashboard-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        /* SIDEBAR */
        .sidebar {
            flex: 0 0 240px;
            background: var(--surface);
            border-radius: 28px;
            padding: 1.5rem 0.5rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .menu-item i {
            font-size: 1.2rem;
            width: 1.8rem;
            color: var(--accent-green);
        }

        .menu-item:hover {
            background: var(--accent-soft);
            color: var(--accent-green);
            transform: scale(1.02);
        }

        .menu-item.active {
            background: var(--accent-green);
            color: white;
            box-shadow: 0 8px 18px rgba(10, 61, 42, 0.3);
        }

        .menu-item.active i {
            color: white;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            background: var(--surface);
            border-radius: 32px;
            padding: 2rem 2rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            min-height: 70vh;
        }

        /* sections */
                <section id="profile" class="section active-section">
                    <h2 data-i18n="heading_profile">👤 Seller profile</h2>
                    <div class="stat-card">
                        <p><i class="fas fa-user"></i> <strong data-i18n="name">Name:</strong> <span id="profileName"></span></p>
                        <p><i class="fas fa-phone"></i> <strong data-i18n="phone">Phone:</strong> <span id="profilePhone"></span></p>
                        <p><i class="fas fa-badge"></i> <strong data-i18n="role">Role:</strong> <span data-i18n="seller">Seller</span></p>
                    </div>
                </section>
            </main>
        </div>
    </div>
<script>
(function() {
    // ────────────────────────────────────────────────
    //               User ID Handling (Improved)
    // ────────────────────────────────────────────────
    let currentUserId = localStorage.getItem('currentUserId');
    if (currentUserId) {
        currentUserId = Number(currentUserId);  // حول لـ number من البداية
        if (isNaN(currentUserId)) currentUserId = null;
    }

    // ────────────────────────────────────────────────
    //               TRANSLATION DICTIONARY
    // ────────────────────────────────────────────────
    const translations = {
        en: {
            menu_overview: "Overview",
            menu_addMaterial: "Add Material",
            menu_myMaterials: "My Materials",
            menu_statistics: "Statistics",
            menu_rewards: "Rewards / Points",
            menu_profile: "Profile",
            menu_settings: "Settings",
            heading_overview: "🌍 Overview",
            heading_addMaterial: "➕ Register material",
            heading_myMaterials: "📦 My materials",
            heading_statistics: "📊 Statistics",
            heading_rewards: "🏆 Rewards",
            heading_profile: "👤 Seller profile",
            heading_settings: "⚙️ Settings",
            total_materials: "Total materials",
            total_points: "Total points",
            recent_uploads: "Recent uploads",
            material_type: "Material type",
            aluminum: "Aluminum",
            plastic: "Plastic",
            paper: "Paper",
            glass: "Glass",
            weight_grams: "Weight (grams)",
            weight_placeholder: "e.g. 500",
            upload_image: "Upload image",
            add_material_btn: "Add material",
            total_grams: "Total grams",
            total_points_stat: "Total points",
            uploads: "Uploads",
            hourly_increase: "Hourly increase (last 24h vs previous)",
            total_points_rewards: "Total points:",
            next_milestone: "Next milestone: 1000 pts",
            milestone_badge: "♻️ 500 pts = Bronze, 1000 pts = Silver, 5000 = Gold",
            name: "Name:",
            phone: "Phone:",
            role: "Role:",
            seller: "Seller",
            theme_toggle: "Light / Dark",
            lang_toggle: "English",
            settings_note: "Theme and language toggles — same functionality.",
            no_materials: "No materials added yet.",
            impact_message: "You helped recycle <strong>{grams}g</strong> of materials. Keep saving the planet! 🌱"
        },
        ar: {
            menu_overview: "نظرة عامة",
            menu_addMaterial: "إضافة مادة",
            menu_myMaterials: "المواد الخاصة بي",
            menu_statistics: "الإحصائيات",
            menu_rewards: "المكافآت / النقاط",
            menu_profile: "الملف الشخصي",
            menu_settings: "الإعدادات",
            heading_overview: "🌍 نظرة عامة",
            heading_addMaterial: "➕ تسجيل مادة",
            heading_myMaterials: "📦 المواد الخاصة بي",
            heading_statistics: "📊 الإحصائيات",
            heading_rewards: "🏆 المكافآت",
            heading_profile: "👤 ملف البائع",
            heading_settings: "⚙️ الإعدادات",
            total_materials: "إجمالي المواد",
            total_points: "إجمالي النقاط",
            recent_uploads: "آخر الرفعات",
            material_type: "نوع المادة",
            aluminum: "ألومنيوم",
            plastic: "بلاستيك",
            paper: "ورق",
            glass: "زجاج",
            weight_grams: "الوزن (جرام)",
            weight_placeholder: "مثال: 500",
            upload_image: "رفع صورة",
            add_material_btn: "إضافة مادة",
            total_grams: "إجمالي الجرامات",
            total_points_stat: "إجمالي النقاط",
            uploads: "الرفعات",
            hourly_increase: "الزيادة خلال آخر 24 ساعة مقارنة بالسابقة",
            total_points_rewards: "إجمالي النقاط:",
            next_milestone: "الهدف التالي: 1000 نقطة",
            milestone_badge: "♻️ 500 نقطة = برونزي، 1000 = فضي، 5000 = ذهبي",
            name: "الاسم:",
            phone: "الهاتف:",
            role: "الدور:",
            seller: "بائع",
            theme_toggle: "فاتح / داكن",
            lang_toggle: "عربي",
            settings_note: "أزرار السمة واللغة — نفس الوظائف.",
            no_materials: "لا توجد مواد مضافة بعد.",
            impact_message: "لقد ساعدت في إعادة تدوير <strong>{grams}g</strong> من المواد. استمر في إنقاذ الكوكب! 🌱"
        }
    };

    // ────────────────────────────────────────────────
    //               HELPERS
    // ────────────────────────────────────────────────
    function getCurrentLang() {
        return document.body.dir === 'rtl' ? 'ar' : 'en';
    }

    function applyTranslations(lang) {
        const elements = document.querySelectorAll('[data-i18n]');
        elements.forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang]?.[key]) {
                if (el.tagName === 'OPTION') {
                    el.textContent = translations[lang][key];
                } else {
                    el.innerHTML = translations[lang][key];
                }
            }
        });

        const placeholders = document.querySelectorAll('[data-i18n-placeholder]');
        placeholders.forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (translations[lang]?.[key]) {
                el.placeholder = translations[lang][key];
            }
        });
    }

    // ────────────────────────────────────────────────
    //               INITIAL STORAGE DEFAULTS
    // ────────────────────────────────────────────────
    if (!localStorage.getItem('userName')) localStorage.setItem('userName', 'Amina Al-Rashid');
    if (!localStorage.getItem('userPhone')) localStorage.setItem('userPhone', '+966 50 123 4567');
    if (!localStorage.getItem('materials')) localStorage.setItem('materials', JSON.stringify([]));

    let materials = JSON.parse(localStorage.getItem('materials')) || [];
    let chartInstance = null;

    function saveMaterials() {
        localStorage.setItem('materials', JSON.stringify(materials));
        renderAllSections();
    }

    function renderAllSections() {
        renderMyMaterials();
        renderStatistics();
        renderOverview();
        renderRewards();
        renderProfile();
    }

    // ────────────────────────────────────────────────
    //               RENDER FUNCTIONS (with safe userId compare)
    // ────────────────────────────────────────────────
    function renderProfile() {
        document.getElementById('profileName').innerText = localStorage.getItem('userName') || '—';
        document.getElementById('profilePhone').innerText = localStorage.getItem('userPhone') || '—';
    }

    function renderRewards() {
        const userMaterials = currentUserId 
            ? materials.filter(m => String(m.userId) === String(currentUserId))
            : [];
        const totalPoints = userMaterials.reduce((acc, m) => acc + (Number(m.points) || 0), 0);
        document.getElementById('rewardPoints').innerText = totalPoints;
        const percent = Math.min(100, (totalPoints / 1000) * 100);
        document.getElementById('milestoneBar').style.width = percent + '%';
        document.getElementById('milestoneText').innerText = totalPoints + '/1000';
    }

    function renderOverview() {
        const userMaterials = currentUserId 
            ? materials.filter(m => String(m.userId) === String(currentUserId))
            : [];
        const totalMaterials = userMaterials.length;
        const totalPoints = userMaterials.reduce((acc, m) => acc + (Number(m.points) || 0), 0);
        const totalGrams = userMaterials.reduce((acc, m) => acc + (Number(m.weight) || 0), 0);

        document.getElementById('overviewTotalMaterials').innerText = totalMaterials;
        document.getElementById('overviewTotalPoints').innerText = totalPoints;

        const lang = getCurrentLang();
        const impactTemplate = translations[lang]?.impact_message || translations.en.impact_message;
        document.getElementById('impactText').innerHTML = impactTemplate.replace('{grams}', totalGrams);

        const recent = [...userMaterials].reverse().slice(0, 3);
        const container = document.getElementById('recentUploads');
        container.innerHTML = '';
        recent.forEach(m => {
            const card = document.createElement('div');
            card.className = 'material-card';
            card.innerHTML = `
                <i class="fas fa-trash delete-icon" data-id="${m.id}"></i>
                <img src="${m.imageBase64 || 'https://via.placeholder.com/150?text=recycle'}" alt="material">
                <p><strong>${m.name}</strong> ${m.weight}g</p>
                <small>${new Date(m.date).toLocaleDateString()}</small>
            `;
            container.appendChild(card);
        });
    }

    function renderMyMaterials() {
        const container = document.getElementById('materialsList');
        container.innerHTML = '';

        const userMaterials = currentUserId 
            ? materials.filter(m => String(m.userId) === String(currentUserId))
            : [];

        if (userMaterials.length === 0) {
            const lang = getCurrentLang();
            const msg = translations[lang]?.no_materials || translations.en.no_materials;
            container.innerHTML = `<p class="stat-card">${msg}</p>`;
            return;
        }

        userMaterials.slice().reverse().forEach(m => {
            const card = document.createElement('div');
            card.className = 'material-card';
            card.innerHTML = `
                <i class="fas fa-trash delete-icon" data-id="${m.id}"></i>
                <img src="${m.imageBase64 || 'https://via.placeholder.com/150?text=BEKYA'}" alt="img">
                <div class="flex-between"><span>${m.name}</span><span class="badge">${m.weight}g</span></div>
                <div class="flex-between"><span>⭐ ${m.points} pts</span><small>${new Date(m.date).toLocaleDateString()}</small></div>
            `;
            container.appendChild(card);
        });
    }

    function renderStatistics() {
        const userMaterials = currentUserId 
            ? materials.filter(m => String(m.userId) === String(currentUserId))
            : [];

        const totalGrams  = userMaterials.reduce((acc, m) => acc + (Number(m.weight)  || 0), 0);
        const totalPoints = userMaterials.reduce((acc, m) => acc + (Number(m.points) || 0), 0);
        const uploads = userMaterials.length;

        document.getElementById('statTotalGrams').innerText = totalGrams;
        document.getElementById('statTotalPoints').innerText = totalPoints;
        document.getElementById('statUploads').innerText = uploads;

        const now = Date.now();
        const oneDay = 24 * 60 * 60 * 1000;
        const last24 = userMaterials.filter(m => (now - new Date(m.date).getTime()) <= oneDay)
                                   .reduce((acc, m) => acc + (Number(m.weight) || 0), 0);
        const prev24 = userMaterials.filter(m => {
            const diff = now - new Date(m.date).getTime();
            return diff > oneDay && diff <= 2 * oneDay;
        }).reduce((acc, m) => acc + (Number(m.weight) || 0), 0);

        let increase = 0;
        if (prev24 > 0) increase = ((last24 - prev24) / prev24) * 100;
        else if (last24 > 0) increase = 100;

        document.getElementById('hourlyIncrease').innerText = (increase > 0 ? '+' : '') + increase.toFixed(1) + '%';
        document.getElementById('increaseBar').style.width = Math.min(100, Math.abs(increase)) + '%';

        const ctx = document.getElementById('statsChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const types = [...new Set(userMaterials.map(m => m.name))];
        const pointsByType = types.map(t => 
            userMaterials.filter(m => m.name === t).reduce((acc, m) => acc + (Number(m.points) || 0), 0)
        );

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: types,
                datasets: [{
                    data: pointsByType,
                    backgroundColor: ['#0A3D2A', '#2f8e6b', '#6abf8a', '#a3d9b1'],
                    borderWidth: 0
                }]
            },
            options: { 
                plugins: { 
                    legend: { 
                        labels: { color: getComputedStyle(document.body).getPropertyValue('--text-primary') } 
                    } 
                } 
            }
        });
    }

    // ────────────────────────────────────────────────
    //               ADD MATERIAL
    // ────────────────────────────────────────────────
    document.getElementById('addMaterialBtn').addEventListener('click', function() {
        const name = document.getElementById('materialName').value.trim();
        const weight = parseFloat(document.getElementById('materialWeight').value);

        if (!name) return alert('أدخل اسم المادة من فضلك');
        if (!weight || weight <= 0) return alert('أدخل وزن صحيح (أكبر من 0)');

        const fileInput = document.getElementById('materialImage');
        const file = fileInput.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                addMaterialToStore(name, weight, e.target.result);
            };
            reader.readAsDataURL(file);
        } else {
            addMaterialToStore(name, weight, null);
        }
    });

    function addMaterialToStore(name, weight, imageBase64) {
        const newMaterial = {
            id: Date.now() + Math.random(),
            name,
            weight,
            points: weight,  // ← يمكنك تغيير طريقة حساب النقاط هنا لاحقًا
            date: new Date().toISOString(),
            imageBase64: imageBase64 || null,
            userId: currentUserId || null   // number أو null
        };

        materials.push(newMaterial);
        saveMaterials();

        document.getElementById('materialName').value = '';
        document.getElementById('materialWeight').value = '';
        document.getElementById('materialImage').value = '';
        switchSection('myMaterials');
    }

    // ────────────────────────────────────────────────
    //               SIDEBAR NAVIGATION
    // ────────────────────────────────────────────────
    const menuItems = document.querySelectorAll('.menu-item');
    const sections = document.querySelectorAll('.section');

    function switchSection(sectionId) {
        sections.forEach(s => s.classList.remove('active-section'));
        document.getElementById(sectionId).classList.add('active-section');

        menuItems.forEach(item => item.classList.remove('active'));
        document.querySelector(`.menu-item[data-section="${sectionId}"]`)?.classList.add('active');

        if (sectionId === 'statistics' && chartInstance) renderStatistics();
    }

    menuItems.forEach(item => {
        item.addEventListener('click', (e) => {
            const section = item.getAttribute('data-section');
            if (section) switchSection(section);
        });
    });

    // ────────────────────────────────────────────────
    //               THEME & LANGUAGE
    // ────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;

    function setTheme(theme) {
        if (theme === 'dark') {
            body.classList.add('dark');
            themeIcon.className = 'fas fa-moon';
        } else {
            body.classList.remove('dark');
            themeIcon.className = 'fas fa-sun';
        }
        localStorage.setItem('bekyaTheme', theme);
        if (chartInstance) renderStatistics();
    }

    themeToggle.addEventListener('click', () => {
        const newTheme = body.classList.contains('dark') ? 'light' : 'dark';
        setTheme(newTheme);
    });

    const savedTheme = localStorage.getItem('bekyaTheme') || 'light';
    setTheme(savedTheme);

    const langToggle = document.getElementById('langToggle');

    function setLanguage(lang) {
        if (lang === 'ar') {
            document.body.dir = 'rtl';
            localStorage.setItem('bekyaLang', 'ar');
        } else {
            document.body.dir = 'ltr';
            localStorage.setItem('bekyaLang', 'en');
        }
        applyTranslations(lang);
        renderAllSections();
        if (chartInstance) renderStatistics();
    }

    langToggle.addEventListener('click', () => {
        const currentDir = document.body.dir || 'ltr';
        const newLang = currentDir === 'ltr' ? 'ar' : 'en';
        setLanguage(newLang);
    });

    const savedLang = localStorage.getItem('bekyaLang') || 'en';
    setLanguage(savedLang);

    // ────────────────────────────────────────────────
    //               DELETE MATERIAL
    // ────────────────────────────────────────────────
    function deleteMaterial(id) {
        const index = materials.findIndex(m => m.id.toString() === id.toString());
        if (index === -1) return;
        materials.splice(index, 1);
        saveMaterials();
        deleteFromIndexedDB(id);
    }

    function deleteFromIndexedDB(id) {
        const request = indexedDB.open('bekyaDB', 1);
        request.onsuccess = function(event) {
            const db = event.target.result;
            if (db.objectStoreNames.contains('materials')) {
                const tx = db.transaction('materials', 'readwrite');
                const store = tx.objectStore('materials');
                store.delete(Number(id));
            }
            db.close();
        };
        request.onerror = function() {};
    }

    document.getElementById('materialsList').addEventListener('click', function(e) {
        const deleteIcon = e.target.closest('.delete-icon');
        if (deleteIcon) {
            e.preventDefault();
            deleteMaterial(deleteIcon.dataset.id);
        }
    });

    document.getElementById('recentUploads').addEventListener('click', function(e) {
        const deleteIcon = e.target.closest('.delete-icon');
        if (deleteIcon) {
            e.preventDefault();
            deleteMaterial(deleteIcon.dataset.id);
        }
    });

    // ────────────────────────────────────────────────
    //               INIT
    // ────────────────────────────────────────────────
    renderAllSections();
    switchSection('overview');
})();
</script>
</body>
</html>
