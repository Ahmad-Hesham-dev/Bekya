<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEKYA · Admin Panel</title>
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --primary: #1e3a2f;
      --primary-light: #2f8e6b;
      --card-bg: #ffffff;
      --border: #d1d5db;
      --table-head: #e2f0e9;
      --hover: #f1f5f9;
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
      --danger: #dc2626;
      --radius: 16px;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --primary: #a3e4d7;
      --primary-light: #6ee7c2;
      --card-bg: #1e293b;
      --border: #334155;
      --table-head: #334155;
      --hover: #334155;
      --shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
      transition: background 0.4s, color 0.4s;
    }

    .dashboard { max-width: 1440px; margin: 0 auto; }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--primary);
    }

    .logo {
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .settings-group {
      display: flex;
      gap: 0.8rem;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-btn:hover {
      background: var(--hover);
      transform: scale(1.08);
      border-color: var(--primary-light);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-weight: 600;
      color: var(--text);
    }

    .role-filter {
      padding: 0.7rem 1.2rem;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      min-width: 170px;
    }

    .table-wrapper {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table { width: 100%; border-collapse: collapse; min-width: 1000px; }

    th {
      background: var(--table-head);
      color: var(--primary);
      font-weight: 600;
      font-size: 0.88rem;
      text-transform: uppercase;
      padding: 1.1rem 1.3rem;
      text-align: left;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 1.1rem 1.3rem;
      border-bottom: 1px solid var(--border);
    }

    tr:hover td { background: var(--hover); }

    .delete-btn {
      background: transparent;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: white;
    }

    .empty-message {
      text-align: center;
      padding: 4rem;
      color: var(--text);
      opacity: 0.65;
      font-style: italic;
    }

    .role-badge {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--table-head);
      color: var(--primary);
      border: 1px solid var(--primary-light);
    }

    .stats-note {
      margin-top: 1.3rem;
      text-align: right;
      color: var(--text);
      opacity: 0.8;
      font-size: 0.92rem;
    }

    [dir="rtl"] .stats-note { text-align: left; }
  </style>
</head>
<body data-theme="light">

  <div class="dashboard">
    <nav class="navbar">
      <span class="logo" data-i18n="title">BEKYA · Admin</span>
      <div class="settings-group">
        <button class="toggle-btn" id="themeToggle" aria-label="Toggle theme">
          <i class="fas fa-sun"></i>
        </button>
        <button class="toggle-btn" id="langToggle" aria-label="Toggle language">
          <i class="fas fa-globe"></i><span class="lang-label"></span>
        </button>
      </div>
    </nav>

    <div class="filter-bar">
      <label for="roleFilter" data-i18n="filterLabel">Filter by role:</label>
      <select id="roleFilter" class="role-filter">
        <option value="all" data-i18n="allUsers">All users</option>
        <option value="seller" data-i18n="sellers">Sellers</option>
        <option value="outlet" data-i18n="outlets">Outlets</option>
        <option value="admin" data-i18n="admins">Admins</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table id="userTable">
        <thead>
          <tr>
            <th data-i18n="name">Name</th>
            <th data-i18n="phone">Phone</th>
            <th data-i18n="role">Role</th>
            <th data-i18n="sellerKG">Seller KG</th>
            <th data-i18n="sellerPoints">Seller Points</th>
            <th data-i18n="outletKG">Outlet KG</th>
            <th data-i18n="outletPoints">Outlet Points</th>
            <th data-i18n="actions">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty-message" data-i18n="loading">Loading users...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="stats-note" id="statsNote"></div>
  </div>

  <script>
    (async function() {
      // ─── Dexie setup ─────────────────────────────────────
      const dbUsers = new Dexie('BEKYADatabase');
      dbUsers.version(1).stores({ Users: '++id, name, phone, role, weight, points' });

      const dbOutlet = new Dexie('RecycleOutletDB');
      dbOutlet.version(2).stores({ records: '++id, sellerName, phone, materialType, weight, timestamp, points, userId' });

      await Promise.all([dbUsers.open(), dbOutlet.open()]);

      // ─── DOM ─────────────────────────────────────────────
      const tbody      = document.getElementById('tableBody');
      const roleFilter = document.getElementById('roleFilter');
      const statsNote  = document.getElementById('statsNote');
      const themeBtn   = document.getElementById('themeToggle');
      const langBtn    = document.getElementById('langToggle');

      // ─── Translations ────────────────────────────────────
      const translations = {
        en: {
          title: "BEKYA · Admin",
          filterLabel: "Filter by role:",
          allUsers: "All users",
          sellers: "Sellers",
          outlets: "Outlets",
          admins: "Admins",
          name: "Name",
          phone: "Phone",
          role: "Role",
          sellerKG: "Seller KG",
          sellerPoints: "Seller Points",
          outletKG: "Outlet KG",
          outletPoints: "Outlet Points",
          actions: "Actions",
          loading: "Loading users...",
          noUsers: "No users found for this filter",
          deleteConfirm: 'Delete "{name}" and all related data?',
          deleteBtn: "Delete",
          stats: "Showing {count} users · Total KG (sellers): {kg} kg · Total points (outlets): {points}"
        },
        ar: {
          title: "بيكيا · لوحة الإدارة",
          filterLabel: "تصفية حسب الدور:",
          allUsers: "كل المستخدمين",
          sellers: "البائعين",
          outlets: "المنافذ",
          admins: "الإداريين",
          name: "الاسم",
          phone: "الهاتف",
          role: "الدور",
          sellerKG: "كيلو البائع",
          sellerPoints: "نقاط البائع",
          outletKG: "كيلو المنفذ",
          outletPoints: "نقاط المنفذ",
          actions: "الإجراءات",
          loading: "جاري تحميل المستخدمين...",
          noUsers: "لا يوجد مستخدمين بهذا التصفية",
          deleteConfirm: 'هل تريد حذف "{name}" وكل البيانات المرتبطة به؟',
          deleteBtn: "حذف",
          stats: "عرض {count} مستخدم · إجمالي الكيلو (البائعين): {kg} كجم · إجمالي النقاط (المنافذ): {points}"
        }
      };

      let currentLang = localStorage.getItem('adminLang') || 'en';

      function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('adminLang', lang);

        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

        langBtn.innerHTML = lang === 'ar'
          ? '<i class="fas fa-globe"></i><span class="lang-label"></span>'
          : '<i class="fas fa-globe"></i><span class="lang-label"></span>';

        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (translations[lang][key]) {
            el.textContent = translations[lang][key];
          }
        });

        loadUsers();  // إعادة رسم الجدول باللغة الجديدة
      }

      // ─── Theme ───────────────────────────────────────────
      function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('adminTheme', theme);

        themeBtn.innerHTML = theme === 'dark'
          ? '<i class="fas fa-moon"></i>'
          : '<i class="fas fa-sun"></i>';
      }

      // ─── Init from storage ───────────────────────────────
      const savedTheme = localStorage.getItem('adminTheme') || 'light';
      setTheme(savedTheme);

      setLanguage(currentLang);

      // ─── Event listeners ─────────────────────────────────
      themeBtn.addEventListener('click', () => {
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });

      langBtn.addEventListener('click', () => {
        const next = currentLang === 'ar' ? 'en' : 'ar';
        setLanguage(next);
      });

      // ─── Table logic (same as before, but with i18n) ─────
      function getSellerMaterials() {
        const stored = localStorage.getItem('materials');
        return stored ? JSON.parse(stored) : [];
      }

      function escapeHtml(unsafe) {
        if (unsafe == null) return '';
        return String(unsafe)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      async function loadUsers() {
        const users = await dbUsers.Users.toArray();
        const sellerMaterials = getSellerMaterials();
        const outletRecords = await dbOutlet.records.toArray();

        const sellerMap = new Map();
        sellerMaterials.forEach(m => {
          const uid = Number(m.userId);
          if (uid && !isNaN(uid)) {
            if (!sellerMap.has(uid)) sellerMap.set(uid, {kg:0, points:0});
            const d = sellerMap.get(uid);
            d.kg += Number(m.weight)||0;
            d.points += Number(m.points)||0;
          }
        });

        const outletMap = new Map();
        outletRecords.forEach(r => {
          const uid = Number(r.userId);
          if (uid && !isNaN(uid)) {
            if (!outletMap.has(uid)) outletMap.set(uid, {kg:0, points:0});
            const d = outletMap.get(uid);
            d.kg += Number(r.weight)||0;
            d.points += Number(r.points)||0;
          }
        });

        const userList = users.map(u => ({
          id: u.id,
          name: u.name || (currentLang==='ar'?'غير معروف':'Unknown'),
          phone: u.phone || (currentLang==='ar'?'غير محدد':'Not set'),
          role: u.role || (currentLang==='ar'?'غير معروف':'Unknown'),
          sellerKg: sellerMap.get(u.id)?.kg    || 0,
          sellerPoints: sellerMap.get(u.id)?.points || 0,
          outletKg: outletMap.get(u.id)?.kg    || 0,
          outletPoints: outletMap.get(u.id)?.points || 0
        }));

        const filter = roleFilter.value;
        const filtered = filter === 'all' ? userList : userList.filter(u => u.role === filter);

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="empty-message">${translations[currentLang].noUsers}</td></tr>`;
          statsNote.innerText = '';
          return;
        }

        let html = '';
        filtered.forEach(u => {
          const isSeller = u.role === 'seller';
          const isOutlet = u.role === 'outlet';
          html += `
            <tr>
              <td><strong>${escapeHtml(u.name)}</strong></td>
              <td>${escapeHtml(u.phone)}</td>
              <td><span class="role-badge">${escapeHtml(u.role)}</span></td>
              <td>${isOutlet ? '—' : u.sellerKg.toFixed(2) + ' kg'}</td>
              <td>${isOutlet ? '—' : u.sellerPoints.toFixed(0)}</td>
              <td>${isSeller ? '—' : u.outletKg.toFixed(2) + ' kg'}</td>
              <td>${isSeller ? '—' : u.outletPoints.toFixed(0)}</td>
              <td>
                <button class="delete-btn" data-id="${u.id}" data-name="${escapeHtml(u.name)}">
                  <i class="fas fa-trash-alt"></i> ${translations[currentLang].deleteBtn}
                </button>
              </td>
            </tr>`;
        });
        tbody.innerHTML = html;

        const totalKg = filtered.reduce((s,u)=>s+u.sellerKg,0).toFixed(2);
        const totalPts = filtered.reduce((s,u)=>s+u.outletPoints,0).toFixed(0);

        statsNote.innerText = translations[currentLang].stats
          .replace('{count}', filtered.length)
          .replace('{kg}', totalKg)
          .replace('{points}', totalPts);

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = Number(btn.dataset.id);
            const name = btn.dataset.name;
            const msg = translations[currentLang].deleteConfirm.replace('{name}', name);
            if (!confirm(msg)) return;
            await dbUsers.Users.delete(id);
            const mats = getSellerMaterials();
            localStorage.setItem('materials', JSON.stringify(mats.filter(m => Number(m.userId) !== id)));
            await dbOutlet.records.where('userId').equals(id).delete();
            loadUsers();
          });
        });
      }

      roleFilter.addEventListener('change', loadUsers);
      await loadUsers();
    })();
  </script>
</body>
</html>
